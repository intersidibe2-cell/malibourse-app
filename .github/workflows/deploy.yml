name: Deploy to Aeza Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup env and deploy
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/malibourse-app

            # Create env file
            echo 'DATABASE_URL=postgresql://malibourse_admin:Rg6kHq9zVp2x@localhost:5432/malibourse' > .env.production
            echo 'JWT_SECRET=8f3a2b1c9d4e5f6a7b8c9d0e1f2a3b4c' >> .env.production
            echo 'NEXT_PUBLIC_APP_URL=https://etudiantsmali.ru' >> .env.production
            cp .env.production .env.local

            # Pull latest
            git pull origin master

            # Install and build
            command -v node || (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt install -y nodejs)
            npm install
            npm run build

            # Configure Nginx
            echo 'server {' > /etc/nginx/sites-available/etudiantsmali.ru
            echo '    listen 80;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '    server_name etudiantsmali.ru www.etudiantsmali.ru;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '    location / {' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        proxy_pass http://localhost:3000;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        proxy_http_version 1.1;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        proxy_set_header Upgrade $http_upgrade;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        proxy_set_header Connection '"'"'upgrade'"'"';' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        proxy_set_header Host $host;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        proxy_cache_bypass $http_upgrade;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        proxy_set_header X-Real-IP $remote_addr;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        proxy_set_header X-Forwarded-Proto $scheme;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '    }' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '    location /_next/static {' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        alias /root/malibourse-app/.next/static;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        expires 365d;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '        access_log off;' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '    }' >> /etc/nginx/sites-available/etudiantsmali.ru
            echo '}' >> /etc/nginx/sites-available/etudiantsmali.ru

            ln -sf /etc/nginx/sites-available/etudiantsmali.ru /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            if nginx -t; then systemctl reload nginx; fi

            # Start app
            pm2 restart malibourse || pm2 start npm --name malibourse -- start
            pm2 save

            echo ""
            echo "============================================"
            echo "✅ DEPLOYMENT COMPLETE"
            echo "============================================"

      - name: Setup SSL (certbot)
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if command -v certbot; then
              certbot --nginx -d etudiantsmali.ru -d www.etudiantsmali.ru --non-interactive --agree-tos -m sidibe3131@mail.ru --no-redirect 2>&1 || echo "SSL skipped (DNS not propagated yet)"
              echo "SSL configuration attempted"
            else
              apt install -y certbot python3-certbot-nginx
              certbot --nginx -d etudiantsmali.ru -d www.etudiantsmali.ru --non-interactive --agree-tos -m sidibe3131@mail.ru --no-redirect 2>&1 || echo "SSL skipped"
            fi
