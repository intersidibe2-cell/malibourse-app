name: Deploy to Aeza Server

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Create/update .env.production
            cat > /root/malibourse-app/.env.production << 'ENVEOF'
            DATABASE_URL=postgresql://malibourse_admin:Rg6kHq9zVp2x@localhost:5432/malibourse
            JWT_SECRET=8f3a2b1c9d4e5f6a7b8c9d0e1f2a3b4c
            NEXT_PUBLIC_APP_URL=https://etudiantsmali.ru
            ENVEOF

            # Create .env.local symlink
            cp /root/malibourse-app/.env.production /root/malibourse-app/.env.local 2>/dev/null || true

            # Pull latest code
            cd /root/malibourse-app
            git pull origin master

            # Install Node.js if needed
            command -v node || curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt install -y nodejs

            # Install and build
            npm install
            npm run build

            # Configure Nginx
            cat > /etc/nginx/sites-available/etudiantsmali.ru << 'NGINX'
            server {
                listen 80;
                server_name etudiantsmali.ru www.etudiantsmali.ru;

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /_next/static {
                    alias /root/malibourse-app/.next/static;
                    expires 365d;
                    access_log off;
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/etudiantsmali.ru /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            # Restart app
            pm2 restart malibourse || pm2 start npm --name malibourse -- start
            pm2 save

            echo ""
            echo "================================================"
            echo "✅ DEPLOYMENT SUCCESSFUL!"
            echo "================================================"
            echo "App running on port 3000"
            echo "Nginx on port 80"
            echo "Configure DNS: etudiantsmali.ru -> 109.120.152.235"
